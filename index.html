<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>520 - Tiám</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; font-family: 'Georgia', 'Times New Roman', serif; }
body { background: #0a0014; }

#aurora {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
  background: radial-gradient(ellipse at 20% 30%, rgba(80,0,100,0.3) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 70%, rgba(100,0,80,0.25) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(25,0,50,1) 0%, #0a0014 70%);
  animation: auroraPulse 10s ease-in-out infinite alternate;
}
@keyframes auroraPulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }

#canvas { position: absolute; top: 0; left: 0; z-index: 1; }
#guide-canvas { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
#petal-canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

/* Intro - more romantic */
#intro {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200;
  background: radial-gradient(ellipse at center, #1a0028 0%, #0a0014 100%);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  opacity: 1; transition: opacity 1.5s ease; cursor: pointer;
}
#intro.hide { opacity: 0; pointer-events: none; }
#intro-line1 {
  color: rgba(255,182,193,0.6); font-size: 15px; letter-spacing: 2px;
  opacity: 0; animation: introWordFade 1.5s ease forwards 0.5s;
}
#intro-line2 {
  color: rgba(255,182,193,0.9); font-size: 22px; letter-spacing: 4px; margin-top: 12px;
  text-shadow: 0 0 25px rgba(255,105,180,0.5);
  opacity: 0; animation: introWordFade 1.5s ease forwards 1.2s;
}
#intro-line3 {
  color: rgba(255,182,193,0.4); font-size: 12px; margin-top: 30px; letter-spacing: 1px;
  opacity: 0; animation: introWordFade 1.5s ease forwards 2.5s;
}
#intro-dots { margin-top: 25px; display: flex; gap: 8px; opacity: 0; animation: introWordFade 1s ease forwards 3s; }
#intro-dots span {
  width: 5px; height: 5px; border-radius: 50%; background: rgba(255,182,193,0.4);
  animation: dotPulse 1.8s ease-in-out infinite;
}
#intro-dots span:nth-child(2) { animation-delay: 0.3s; }
#intro-dots span:nth-child(3) { animation-delay: 0.6s; }
@keyframes introWordFade { to { opacity: 1; } }
@keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* Hint */
#hint {
  position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
  color: rgba(255,182,193,0.7); font-size: 13px; text-align: center;
  animation: breathe 3s ease-in-out infinite; z-index: 10; pointer-events: none;
  text-shadow: 0 0 10px rgba(255,105,180,0.3); white-space: nowrap;
  opacity: 0; transition: opacity 0.8s ease;
}
#hint.visible { opacity: 1; }
@keyframes breathe { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* Progress ring */
#progress-ring {
  position: fixed; top: 20px; right: 20px; width: 48px; height: 48px;
  z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.8s ease;
}
#progress-ring.visible { opacity: 1; }

/* Reveal - romantic upgrade */
#reveal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  z-index: 20; pointer-events: none; opacity: 0; transition: opacity 1.5s ease;
}
#reveal.show { opacity: 1; }

#photo-frame {
  width: 120px; height: 120px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(255,182,193,0.4); margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(255,105,180,0.35), 0 0 80px rgba(255,105,180,0.1), inset 0 0 25px rgba(255,105,180,0.08);
  transform: scale(0) rotate(-10deg); transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  animation: none;
}
#photo-frame.pop { transform: scale(1) rotate(0deg); animation: photoGlow 3s ease-in-out infinite 1.2s; }
@keyframes photoGlow {
  0%,100% { box-shadow: 0 0 40px rgba(255,105,180,0.35), 0 0 80px rgba(255,105,180,0.1); }
  50% { box-shadow: 0 0 50px rgba(255,105,180,0.5), 0 0 100px rgba(255,105,180,0.2); }
}
#photo-frame img { width: 100%; height: 100%; object-fit: cover; }

#name-text {
  font-size: 58px; font-weight: bold; letter-spacing: 6px;
  background: linear-gradient(135deg, #ff6b9d, #ffd4e5, #ff8ec7, #ff3d7f, #ffb6d9, #ff6b9d);
  background-size: 500% 500%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,105,180,0.4));
  transform: scale(0); transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  margin-bottom: 8px;
}
#name-text.pop { transform: scale(1); }
@keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

#love-poem {
  font-size: 14px; color: rgba(255,182,193,0.55); margin-top: 6px; letter-spacing: 1px;
  opacity: 0; transform: translateY(15px); transition: all 1.2s ease;
  font-style: italic;
}
#love-poem.show { opacity: 1; transform: translateY(0); }

#love-msg {
  font-size: 24px; color: rgba(255,182,193,0.9); margin-top: 20px;
  text-shadow: 0 0 20px rgba(255,105,180,0.35);
  opacity: 0; transform: translateY(20px); transition: all 1.2s ease;
}
#love-msg.show { opacity: 1; transform: translateY(0); }

#love-sub {
  font-size: 13px; color: rgba(255,182,193,0.4); margin-top: 12px; letter-spacing: 2px;
  opacity: 0; transition: opacity 1.2s ease;
}
#love-sub.show { opacity: 1; }

#date-text {
  font-size: 12px; color: rgba(255,182,193,0.25); margin-top: 25px;
  font-family: sans-serif; letter-spacing: 3px;
  opacity: 0; transition: opacity 1s ease;
}
#date-text.show { opacity: 1; }

#replay-btn {
  position: fixed; bottom: 62px; right: 20px;
  background: rgba(255,105,180,0.08);
  border: 1px solid rgba(255,182,193,0.35); border-radius: 16px;
  padding: 5px 14px; color: rgba(255,182,193,0.6); font-size: 12px;
  font-family: 'Georgia', serif; letter-spacing: 1px; cursor: pointer;
  opacity: 0; transition: opacity 1s ease;
  z-index: 30;
}
#replay-btn.show { opacity: 1; }
#replay-btn:active { background: rgba(255,105,180,0.2); color: rgba(255,182,193,0.9); }
#replay-btn.show { opacity: 1; }
#replay-btn:active { background: rgba(255,105,180,0.3); }
</style>
</head>

<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var guideCanvas = document.getElementById('guide-canvas');
  var gCtx = guideCanvas.getContext('2d');
  var petalCanvas = document.getElementById('petal-canvas');
  var pCtx = petalCanvas.getContext('2d');
  var W, H;
  var heartPath = [], filledSegments = [], totalSegments = 0;
  var progress = 0, revealed = false, started = false;

  function resize() {
    W = canvas.width = guideCanvas.width = petalCanvas.width = window.innerWidth;
    H = canvas.height = guideCanvas.height = petalCanvas.height = window.innerHeight;
    generateHeartPath();
  }

  function generateHeartPath() {
    heartPath = [];
    var scale = Math.min(W, H) * 0.28;
    var cx = W / 2, cy = H / 2 - 10;
    var n = 160;
    for (var i = 0; i <= n; i++) {
      var t = (i / n) * Math.PI * 2;
      var x = 16 * Math.pow(Math.sin(t), 3);
      var y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      heartPath.push({ x: cx + x * (scale / 16), y: cy + y * (scale / 16) });
    }
    totalSegments = heartPath.length - 1;
    filledSegments = new Array(totalSegments).fill(false);
  }

  // === INTRO ===
  var introEl = document.getElementById('intro');
  function startDrawing() {
    if (started) return;
    started = true;
    introEl.classList.add('hide');
    setTimeout(function() {
      introEl.style.display = 'none';
      document.getElementById('hint').classList.add('visible');
      document.getElementById('progress-ring').classList.add('visible');
    }, 1500);
  }
  introEl.addEventListener('click', startDrawing);
  introEl.addEventListener('touchstart', function(e) { e.preventDefault(); startDrawing(); }, {passive: false});

  // === DRAWING ===
  var isDrawing = false;

  document.addEventListener('mousedown', function(e) { if (!started || revealed) return; isDrawing = true; handleDraw(e.clientX, e.clientY); });
  document.addEventListener('mousemove', function(e) { if (!isDrawing || !started || revealed) return; handleDraw(e.clientX, e.clientY); });
  document.addEventListener('mouseup', function() { isDrawing = false; });

  document.addEventListener('touchstart', function(e) {
    if (!started || revealed) return;
    e.preventDefault(); isDrawing = true;
    handleDraw(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});
  document.addEventListener('touchmove', function(e) {
    if (!isDrawing || !started || revealed) return;
    e.preventDefault();
    handleDraw(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});
  document.addEventListener('touchend', function(e) { e.preventDefault(); isDrawing = false; }, {passive: false});

  function handleDraw(x, y) {
    if (revealed) return;
    var threshold = Math.min(W, H) * 0.1;
    var anyFilled = false;
    for (var i = 0; i < totalSegments; i++) {
      if (filledSegments[i]) continue;
      var px = (heartPath[i].x + heartPath[i+1].x) / 2;
      var py = (heartPath[i].y + heartPath[i+1].y) / 2;
      var d = Math.sqrt((x-px)*(x-px) + (y-py)*(y-py));
      if (d < threshold) {
        filledSegments[i] = true;
        anyFilled = true;
      }
    }
    for (var i = 0; i < 6; i++) {
      glowParticles.push(makeGlow(x + (Math.random()-0.5)*14, y + (Math.random()-0.5)*14));
    }
    if (Math.random() > 0.55) miniHearts.push(makeMiniHeart(x, y));
    if (anyFilled) updateProgress();
  }

  function updateProgress() {
    var filled = filledSegments.filter(Boolean).length;
    progress = filled / totalSegments;
    document.getElementById('prog-circle').style.strokeDashoffset = (125.6 * (1 - progress)).toString();
    document.getElementById('prog-text').textContent = Math.round(progress * 100) + '%';
    if (progress >= 0.90 && !revealed) triggerReveal();
  }

  // === PARTICLES ===
  var glowParticles = [], miniHearts = [], petals = [], floatingHearts = [];
  var ambientDots = [];
  for (var i = 0; i < 60; i++) {
    ambientDots.push({
      x: Math.random() * 2000, y: Math.random() * 2000,
      size: Math.random() * 1.8 + 0.3, speed: Math.random() * 0.25 + 0.08,
      alpha: Math.random() * 0.3 + 0.1, hue: Math.random() * 60 + 300,
      phase: Math.random() * Math.PI * 2
    });
  }

  function makeGlow(x, y) {
    return { x:x, y:y, size: Math.random()*4+2, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3,
      life:1, decay:0.016+Math.random()*0.01, hue: Math.random()*50+320 };
  }
  function makeMiniHeart(x, y) {
    return { x:x, y:y, size: Math.random()*9+5, vx:(Math.random()-0.5)*2, vy:-Math.random()*3-1,
      alpha:1, decay:0.011, rot: Math.random()*Math.PI*2, hue: Math.random()*40+330 };
  }

  function drawHeartShape(context, x, y, size, alpha, hue, rot) {
    context.save();
    context.translate(x, y);
    if (rot) context.rotate(rot);
    context.beginPath();
    var s = size;
    context.moveTo(0, s*0.3);
    context.bezierCurveTo(-s, -s*0.3, -s, -s, 0, -s*0.5);
    context.bezierCurveTo(s, -s, s, -s*0.3, 0, s*0.3);
    context.fillStyle = 'hsla('+hue+', 90%, 70%, '+alpha+')';
    context.shadowColor = 'hsla('+hue+', 100%, 65%, '+(alpha*0.5)+')';
    context.shadowBlur = 12;
    context.fill();
    context.restore();
  }

  // === GUIDE ===
  function drawGuide() {
    gCtx.clearRect(0, 0, W, H);
    if (!started || revealed) return;

    gCtx.save();
    gCtx.setLineDash([4, 8]);
    gCtx.strokeStyle = 'rgba(255,182,193,0.18)';
    gCtx.lineWidth = 1.5;
    gCtx.beginPath();
    for (var i = 0; i < heartPath.length; i++) {
      if (i === 0) gCtx.moveTo(heartPath[i].x, heartPath[i].y);
      else gCtx.lineTo(heartPath[i].x, heartPath[i].y);
    }
    gCtx.closePath();
    gCtx.stroke();
    gCtx.restore();

    // Glow path with gradient colors
    gCtx.save();
    gCtx.lineCap = 'round';
    gCtx.lineWidth = 3.5;
    gCtx.setLineDash([]);
    for (var i = 0; i < totalSegments; i++) {
      if (!filledSegments[i]) continue;
      var hue = 320 + (i / totalSegments) * 50;
      gCtx.shadowColor = 'hsla('+hue+', 100%, 65%, 0.85)';
      gCtx.shadowBlur = 18;
      gCtx.strokeStyle = 'hsla('+hue+', 100%, 74%, 0.9)';
      gCtx.beginPath();
      gCtx.moveTo(heartPath[i].x, heartPath[i].y);
      gCtx.lineTo(heartPath[i+1].x, heartPath[i+1].y);
      gCtx.stroke();
    }
    gCtx.restore();

    // Start indicator
    if (progress < 0.05) {
      var p = heartPath[0];
      var pulse = Math.sin(Date.now() * 0.003) * 0.4 + 0.6;
      gCtx.save();
      gCtx.beginPath();
      gCtx.arc(p.x, p.y, 9 * pulse, 0, Math.PI * 2);
      gCtx.fillStyle = 'rgba(255,105,180,' + (pulse*0.8) + ')';
      gCtx.shadowColor = 'rgba(255,105,180,0.9)';
      gCtx.shadowBlur = 30;
      gCtx.fill();
      gCtx.restore();
    }
  }

  // === REVEAL ===
  function triggerReveal() {
    revealed = true;
    filledSegments.fill(true);

    document.getElementById('hint').style.opacity = '0';
    document.getElementById('progress-ring').style.opacity = '0';

    // Heart path burst into petals
    setTimeout(function() {
      for (var i = 0; i < heartPath.length; i += 2) {
        (function(idx) {
          setTimeout(function() {
            for (var j = 0; j < 4; j++) petals.push(makePetal(heartPath[idx].x, heartPath[idx].y));
          }, idx * 5);
        })(i);
      }
    }, 200);

    // Grand center burst
    setTimeout(function() {
      for (var i = 0; i < 80; i++) {
        (function(idx) {
          setTimeout(function() {
            petals.push(makePetal(W/2+(Math.random()-0.5)*50, H/2+(Math.random()-0.5)*50));
          }, idx * 10);
        })(i);
      }
    }, 600);

    // Reveal sequence
    setTimeout(function() { gCtx.clearRect(0,0,W,H); document.getElementById('reveal').classList.add('show'); }, 1400);
    setTimeout(function() { document.getElementById('photo-frame').classList.add('pop'); }, 1600);
    setTimeout(function() { document.getElementById('name-text').classList.add('pop'); }, 2200);
    setTimeout(function() { document.getElementById('love-poem').classList.add('show'); }, 2800);
    setTimeout(function() { document.getElementById('love-msg').classList.add('show'); }, 3500);
    setTimeout(function() { document.getElementById('love-sub').classList.add('show'); }, 4200);
    setTimeout(function() { document.getElementById('date-text').classList.add('show'); }, 4800);
    setTimeout(function() { document.getElementById('replay-btn').classList.add('show'); }, 5500);

    // Continuous floating hearts
    setInterval(function() {
      if (floatingHearts.length < 25) {
        floatingHearts.push({
          x: Math.random()*W, y: H+20, size: Math.random()*14+5,
          speed: Math.random()*1+0.5, sway: Math.random()*Math.PI*2,
          alpha: Math.random()*0.3+0.15, hue: Math.random()*40+325, rot:0
        });
      }
    }, 400);
  }

  function makePetal(x, y) {
    var angle = Math.random() * Math.PI * 2;
    var speed = Math.random() * 6 + 2;
    return { x:x, y:y, size: Math.random()*6+3, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      alpha:1, gravity: 0.035+Math.random()*0.025, rot: Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.08, hue: Math.random()*50+315, isHeart: Math.random()>0.35 };
  }

  // === ANIMATE ===
  var t0 = Date.now();
  function animate() {
    var t = (Date.now() - t0) * 0.001;

    ctx.fillStyle = revealed ? 'rgba(10,0,20,0.04)' : 'rgba(10,0,20,0.08)';
    ctx.fillRect(0, 0, W, H);

    // Ambient starfield
    for (var i = 0; i < ambientDots.length; i++) {
      var d = ambientDots[i];
      d.y -= d.speed;
      d.x += Math.sin(t*0.4 + d.phase) * 0.2;
      if (d.y < -5) { d.y = H + 5; d.x = Math.random() * W; }
      var fl = Math.sin(t*1.5+d.phase)*0.3+0.7;
      ctx.beginPath();
      ctx.arc(d.x % W, d.y, d.size, 0, Math.PI*2);
      ctx.fillStyle = 'hsla('+d.hue+',70%,82%,'+(d.alpha*fl)+')';
      ctx.fill();
    }

    // Glow particles
    for (var i = glowParticles.length - 1; i >= 0; i--) {
      var p = glowParticles[i];
      p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94;
      p.life -= p.decay; p.size *= 0.98;
      if (p.life <= 0) { glowParticles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      var grd = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      grd.addColorStop(0, 'hsla('+p.hue+',100%,85%,'+p.life+')');
      grd.addColorStop(1, 'hsla('+p.hue+',100%,60%,0)');
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Mini hearts
    for (var i = miniHearts.length - 1; i >= 0; i--) {
      var h = miniHearts[i];
      h.x += h.vx; h.y += h.vy; h.vy *= 0.98; h.alpha -= h.decay; h.rot += 0.02;
      if (h.alpha <= 0) { miniHearts.splice(i, 1); continue; }
      drawHeartShape(ctx, h.x, h.y, h.size, h.alpha, h.hue, h.rot);
    }

    drawGuide();

    // Petals
    pCtx.clearRect(0, 0, W, H);
    for (var i = petals.length - 1; i >= 0; i--) {
      var p = petals[i];
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.99;
      p.alpha -= 0.006; p.rot += p.rotSpeed;
      if (p.alpha <= 0) { petals.splice(i, 1); continue; }
      if (p.isHeart) {
        drawHeartShape(pCtx, p.x, p.y, p.size, p.alpha, p.hue, p.rot);
      } else {
        pCtx.save(); pCtx.translate(p.x, p.y); pCtx.rotate(p.rot);
        pCtx.beginPath(); pCtx.ellipse(0, 0, p.size, p.size*0.55, 0, 0, Math.PI*2);
        pCtx.fillStyle = 'hsla('+p.hue+',80%,78%,'+p.alpha+')';
        pCtx.shadowColor = 'hsla('+p.hue+',100%,70%,'+(p.alpha*0.4)+')';
        pCtx.shadowBlur = 8; pCtx.fill(); pCtx.restore();
      }
    }

    // Floating hearts
    for (var i = floatingHearts.length - 1; i >= 0; i--) {
      var fh = floatingHearts[i];
      fh.y -= fh.speed; fh.x += Math.sin(t*0.8 + fh.sway)*0.6; fh.rot += 0.004;
      if (fh.y < -40) { floatingHearts.splice(i, 1); continue; }
      drawHeartShape(pCtx, fh.x, fh.y, fh.size, fh.alpha, fh.hue, fh.rot);
    }

    requestAnimationFrame(animate);
  }

  resize();
  window.addEventListener('resize', resize);
  animate();

  // === REPLAY ===
  window.replayGame = function() {
    revealed = false;
    started = true;
    progress = 0;
    filledSegments = new Array(totalSegments).fill(false);
    glowParticles = []; miniHearts = []; petals = []; floatingHearts = [];

    document.getElementById('reveal').classList.remove('show');
    document.getElementById('photo-frame').classList.remove('pop');
    document.getElementById('name-text').classList.remove('pop');
    document.getElementById('love-poem').classList.remove('show');
    document.getElementById('love-msg').classList.remove('show');
    document.getElementById('love-sub').classList.remove('show');
    document.getElementById('date-text').classList.remove('show');
    document.getElementById('replay-btn').classList.remove('show');

    document.getElementById('hint').style.opacity = '';
    document.getElementById('hint').classList.add('visible');
    document.getElementById('progress-ring').style.opacity = '';
    document.getElementById('progress-ring').classList.add('visible');
    document.getElementById('prog-circle').style.strokeDashoffset = '125.6';
    document.getElementById('prog-text').textContent = '0%';

    gCtx.clearRect(0, 0, W, H);
    pCtx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(10,0,20,1)';
    ctx.fillRect(0, 0, W, H);
  };
})();
</script>
</body>
</html>
